<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>YUZI VPS PANEL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#020617;
  color:#e5e7eb;
}
.app{
  max-width:480px;
  margin:20px auto;
  padding:15px;
}
.card{
  background:#020617;
  border:1px solid #1e293b;
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
}
h2,h3{text-align:center;margin:5px 0}
input,button,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}
input,select{
  background:#020617;
  border:1px solid #334155;
  color:white;
}
button{
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button.green{background:#16a34a}
button.red{background:#dc2626}
button.gray{background:#475569}
.row{display:flex;gap:6px}
.row button{flex:1}
.small{
  font-size:12px;
  color:#94a3b8;
  text-align:center;
}
.hide{display:none}
.badge{
  padding:4px 8px;
  border-radius:20px;
  font-size:12px;
  background:#16a34a;
}
.badge.off{background:#dc2626}
</style>
</head>
<body>

<div class="app">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>🔐 YUZI PANEL</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
<div class="small">VPS Panel Simulation</div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="hide">

<div class="card">
<h2>🖥️ VPS DASHBOARD</h2>
<div>CPU: <b id="cpu">0%</b></div>
<div>RAM: <b id="ram">0 / 4 GB</b></div>
<div>Disk: <b id="disk">0 / 50 GB</b></div>
<div>Status: <span id="status" class="badge">ONLINE</span></div>
</div>

<div class="card">
<h3>⚙️ SERVER CONTROL</h3>
<div class="row">
<button onclick="toggle()" id="power">STOP</button>
<button onclick="restart()" class="gray">RESTART</button>
</div>
</div>

<div class="card">
<h3>🎮 GAME SERVER</h3>
<select>
<option>Free Fire</option>
<option>Minecraft</option>
<option>MLBB</option>
</select>
<button class="green">START GAME SERVER</button>
</div>

<div class="card">
<h3>👤 USER MANAGER</h3>
<input id="newUser" placeholder="Username baru">
<button onclick="addUser()">ADD USER</button>
<ul id="userList"></ul>
</div>

<button class="red" onclick="logout()">LOGOUT
